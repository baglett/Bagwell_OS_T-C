<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagwell OS — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a2e;
      background: #f5f5f7;
    }
    header {
      background: #1a1a2e;
      color: #f5f5f7;
      text-align: center;
      padding: 3rem 1rem 2rem;
    }
    header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    header p  { font-size: 1.05rem; opacity: 0.8; }
    .cards {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 700px;
      margin: -1.5rem auto 3rem;
      padding: 0 1rem;
    }
    .card {
      flex: 1 1 280px;
      max-width: 320px;
      background: #fff;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #1a1a2e; }
    .card p  { font-size: 0.95rem; color: #555; }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bagwell OS</h1>
    <p>Legal Documents</p>
  </header>
  <nav class="cards">
    <a href="privacy-policy.html" class="card">
      <h2>Privacy Policy</h2>
      <p>How we collect, use, and protect your information.</p>
    </a>
    <a href="terms-and-conditions.html" class="card">
      <h2>Terms &amp; Conditions</h2>
      <p>Rules governing your use of the Bagwell OS SMS service.</p>
    </a>
  </nav>
  <footer>&copy; 2026 Bagwell OS. All rights reserved.</footer>
</body>
</html>
